version: 2

updates:
  # Library runtime + dev dependencies (root composer.json).
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Bundle non-breaking bumps into one PR; major updates still arrive as individual PRs for review.
    groups:
      composer-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Functional test harness (separate composer project under tests/functional).
  - package-ecosystem: "composer"
    directory: "/tests/functional"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      composer-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI and mutation workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"
