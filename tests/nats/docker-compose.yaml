services:
  nats:
    image: nats:alpine
    container_name: nats_test
    restart: always
    command: -c /etc/nats/nats.conf
    ports:
      - "4222:4222" # client port
      - "6223:6222" # cluster port (changed to avoid conflict)
      - "8223:8222" # monitoring port (changed to avoid conflict)
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
      - ./data:/data

  nats-tls:
    image: nats:alpine
    container_name: nats_test_tls
    restart: always
    command: -c /etc/nats/nats.conf
    ports:
      - "4223:4222" # TLS client port
      - "6224:6222" # TLS cluster port
      - "8224:8222" # TLS monitoring port
    volumes:
      - ./nats-tls.conf:/etc/nats/nats.conf
      - ./certs:/etc/nats/certs:ro
      - ./data-tls:/data

  nats-mtls:
    image: nats:alpine
    container_name: nats_test_mtls
    restart: always
    command: -c /etc/nats/nats.conf
    ports:
      - "4224:4222" # mTLS client port
      - "6225:6222" # mTLS cluster port
      - "8225:8222" # mTLS monitoring port
    volumes:
      - ./nats-mtls.conf:/etc/nats/nats.conf
      - ./certs:/etc/nats/certs:ro
      - ./data-mtls:/data